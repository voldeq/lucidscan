# LucidShark Configuration
# This file is used for development tooling configuration only.
# LucidShark is distributed as a standalone binary via install.sh

# Pytest configuration
[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
# Exclude project-based integration tests by default (they require external deps)
# Run with: pytest tests/integration/projects -v
# Also ignore test projects' internal tests (python-webapp/tests, etc.)
# Scanner CLI integration tests are excluded because they depend on downloaded binaries
# and specific platform/dependency states. Run with: pytest tests/integration/scanners -v
addopts = "--ignore=tests/integration/projects --ignore=tests/integration/projects/python-webapp/tests --ignore=tests/integration/projects/typescript-api/tests --ignore=tests/integration/scanners"
markers = [
    "integration: marks tests as integration tests (run with: pytest -m integration)",
]

# Tool versions - single source of truth for lucidshark-managed tools
# Only includes tools that LucidShark downloads itself (security tools + duplo)
# Language-specific tools (ruff, biome, etc.) should be installed via package managers
[tool.lucidshark.tools]
# Security scanners
trivy = "0.69.3"
opengrep = "1.16.4"
checkov = "3.2.508"
gosec = "2.24.7"
# Java tools
pmd = "7.22.0"
checkstyle = "13.3.0"
spotbugs = "4.9.8"
# Duplication detection
duplo = "0.1.7"
