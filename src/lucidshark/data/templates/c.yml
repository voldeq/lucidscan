# C language template - all supported tools, all domains enabled
pipeline:
  linting:
    enabled: true
    tools:
      - name: clang_tidy

  formatting:
    enabled: true
    tools:
      - name: clang_format

  type_checking:
    enabled: true
    tools:
      - name: cppcheck

  security:
    enabled: true
    tools:
      - name: trivy
        domains: [sca]
      - name: opengrep
        domains: [sast]
      - name: checkov
        domains: [iac]

  testing:
    enabled: true
    tools:
      - name: ctest

  coverage:
    enabled: true
    tools:
      - name: gcov
    threshold: 80

  duplication:
    enabled: true
    tools:
      - name: duplo
    threshold: 5.0
    min_lines: 7

fail_on:
  linting: error
  type_checking: error
  security: high
  testing: any
  coverage: below_threshold
  duplication: above_threshold
  formatting: error

exclude:
  - "**/.git/**"
  - "**/build/**"
  - "**/cmake-build-*/**"
  - "**/*.o"
  - "**/*.gcda"
  - "**/*.gcno"
