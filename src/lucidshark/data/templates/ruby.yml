# Ruby language template - all supported tools, all domains enabled
pipeline:
  linting:
    enabled: true
    tools:
      - name: rubocop

  formatting:
    enabled: true
    tools:
      - name: rubocop_format

  type_checking:
    enabled: true
    tools:
      - name: sorbet

  security:
    enabled: true
    tools:
      - name: trivy
        domains: [sca]
      - name: opengrep
        domains: [sast]
      - name: checkov
        domains: [iac]

  testing:
    enabled: true
    tools:
      - name: rspec

  coverage:
    enabled: true
    tools:
      - name: simplecov
    threshold: 80

  duplication:
    enabled: true
    tools:
      - name: duplo
    threshold: 5.0
    min_lines: 7

fail_on:
  linting: error
  type_checking: error
  security: high
  testing: any
  coverage: below_threshold
  duplication: above_threshold
  formatting: error

exclude:
  - "**/.git/**"
  - "**/vendor/bundle/**"
  - "**/coverage/**"
  - "**/.bundle/**"
  - "**/tmp/**"
