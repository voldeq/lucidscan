# Python language template - all supported tools, all domains enabled
pipeline:
  linting:
    enabled: true
    tools:
      - name: ruff

  formatting:
    enabled: true
    tools:
      - name: ruff_format

  type_checking:
    enabled: true
    tools:
      - name: mypy
      - name: pyright

  security:
    enabled: true
    tools:
      - name: trivy
        domains: [sca]
      - name: opengrep
        domains: [sast]
      - name: checkov
        domains: [iac]

  testing:
    enabled: true
    tools:
      - name: pytest

  coverage:
    enabled: true
    tools:
      - name: coverage_py
    threshold: 80

  duplication:
    enabled: true
    tools:
      - name: duplo
    threshold: 5.0
    min_lines: 7

fail_on:
  linting: error
  type_checking: error
  security: high
  testing: any
  coverage: below_threshold
  duplication: above_threshold
  formatting: error

exclude:
  - "**/__pycache__/**"
  - "**/.venv/**"
  - "**/venv/**"
  - "**/.git/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/*.egg-info/**"
  - "**/.pytest_cache/**"
  - "**/.mypy_cache/**"
  - "**/.ruff_cache/**"
