# Scala language template - all supported tools, all domains enabled
pipeline:
  linting:
    enabled: true
    tools:
      - name: scalafix

  formatting:
    enabled: true
    tools:
      - name: scalafmt

  type_checking:
    enabled: true
    tools:
      - name: scala_compile

  security:
    enabled: true
    tools:
      - name: trivy
        domains: [sca]
      - name: opengrep
        domains: [sast]
      - name: checkov
        domains: [iac]

  testing:
    enabled: true
    tools:
      - name: sbt

  coverage:
    enabled: true
    tools:
      - name: scoverage
    threshold: 80

  duplication:
    enabled: true
    tools:
      - name: duplo
    threshold: 5.0
    min_lines: 7

fail_on:
  linting: error
  type_checking: error
  security: high
  testing: any
  coverage: below_threshold
  duplication: above_threshold
  formatting: error

exclude:
  - "**/.git/**"
  - "**/target/**"
  - "**/build/**"
  - "**/.bsp/**"
  - "**/.metals/**"
  - "**/.bloop/**"
  - "**/project/target/**"
  - "**/*.class"
