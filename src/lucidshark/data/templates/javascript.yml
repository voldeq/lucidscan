# JavaScript language template - all supported tools, all domains enabled
pipeline:
  linting:
    enabled: true
    tools:
      - name: eslint
      - name: biome

  formatting:
    enabled: true
    tools:
      - name: prettier

  security:
    enabled: true
    tools:
      - name: trivy
        domains: [sca]
      - name: opengrep
        domains: [sast]
      - name: checkov
        domains: [iac]

  testing:
    enabled: true
    tools:
      - name: jest
      - name: vitest
      - name: mocha
      - name: karma
      - name: playwright

  coverage:
    enabled: true
    tools:
      - name: istanbul
      - name: vitest_coverage
    threshold: 80

  duplication:
    enabled: true
    tools:
      - name: duplo
    threshold: 5.0
    min_lines: 7

fail_on:
  linting: error
  security: high
  testing: any
  coverage: below_threshold
  duplication: above_threshold
  formatting: error

exclude:
  - "**/node_modules/**"
  - "**/.git/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/.next/**"
  - "**/.nuxt/**"
