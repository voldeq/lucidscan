# Rust language template - all supported tools, all domains enabled
pipeline:
  linting:
    enabled: true
    tools:
      - name: clippy

  formatting:
    enabled: true
    tools:
      - name: rustfmt

  type_checking:
    enabled: true
    tools:
      - name: cargo_check

  security:
    enabled: true
    tools:
      - name: trivy
        domains: [sca]
      - name: opengrep
        domains: [sast]
      - name: checkov
        domains: [iac]

  testing:
    enabled: true
    tools:
      - name: cargo

  coverage:
    enabled: true
    tools:
      - name: tarpaulin
    threshold: 80

  duplication:
    enabled: true
    tools:
      - name: duplo
    threshold: 5.0
    min_lines: 7

fail_on:
  linting: error
  type_checking: error
  security: high
  testing: any
  coverage: below_threshold
  duplication: above_threshold
  formatting: error

exclude:
  - "**/.git/**"
  - "**/target/**"
  - "**/dist/**"
  - "**/build/**"
