name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Run quality checks (includes tests) across platforms before releasing
  quality-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          # Install lucidshark in editable mode to register entry points
          pip install -e .

      - name: Build binary with PyInstaller
        run: |
          pyinstaller lucidshark.spec --clean

      - name: Run LucidShark quality scan
        run: |
          ./dist/lucidshark --verbose scan --all --all-files --format summary

  # Build standalone binaries for all platforms
  build-binaries:
    needs: [quality-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact_name: lucidshark
            asset_name: lucidshark-linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            artifact_name: lucidshark
            asset_name: lucidshark-linux-arm64
          - os: macos-15-intel
            target: darwin-amd64
            artifact_name: lucidshark
            asset_name: lucidshark-darwin-amd64
          - os: macos-latest
            target: darwin-arm64
            artifact_name: lucidshark
            asset_name: lucidshark-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          # Install lucidshark in editable mode to register entry points
          pip install -e .

      - name: Build binary with PyInstaller
        run: pyinstaller lucidshark.spec --clean

      - name: Rename binary for upload
        shell: bash
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  # Create GitHub Release with binaries
  create-release:
    needs: [quality-check, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read versions for release notes
        id: versions
        run: |
          echo "trivy=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['lucidshark']['tools']['trivy'])")" >> $GITHUB_OUTPUT
          echo "opengrep=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['lucidshark']['tools']['opengrep'])")" >> $GITHUB_OUTPUT
          echo "checkov=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['lucidshark']['tools']['checkov'])")" >> $GITHUB_OUTPUT
          echo "gosec=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['lucidshark']['tools']['gosec'])")" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la binaries/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            binaries/lucidshark-linux-amd64
            binaries/lucidshark-linux-arm64
            binaries/lucidshark-darwin-amd64
            binaries/lucidshark-darwin-arm64
          body: |
            ## LucidShark - The Trust Layer for AI-Assisted Development

            LucidShark unifies code quality tools (linting, type checking, security, testing, coverage) into a single pipeline that auto-configures for any project and integrates with AI coding tools like Claude Code and Cursor.

            ## Installation

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/toniantunovi/lucidshark/main/install.sh | bash
            ```

            **Manual download:** See the assets below for pre-built binaries for your platform.

            On first run, plugins automatically download their binaries for your platform.

            ## Features

            - **Security Scanning**: Trivy (SCA), OpenGrep (SAST), gosec (Go SAST), Checkov (IaC)
            - **Linting**: Ruff, ESLint, Biome, Clippy, Checkstyle
            - **Formatting**: Ruff Format, Prettier, rustfmt, gofmt
            - **Type Checking**: mypy, pyright, TypeScript
            - **Testing**: pytest, Jest
            - **Coverage**: coverage.py, Istanbul
            - **AI Integration**: MCP server for Claude Code and Cursor

            ## Quick Start

            ```bash
            # Initialize project
            ./lucidshark init

            # Run all checks
            ./lucidshark scan --all

            # Run specific domains
            ./lucidshark scan --linting --type-checking --testing --coverage

            # Auto-fix linting issues
            ./lucidshark scan --linting --fix

            # MCP server for AI tools
            ./lucidshark serve
            ```

            ## AI Tool Integration

            Add to your Claude Code or Cursor MCP configuration:

            ```json
            {
              "mcpServers": {
                "lucidshark": {
                  "command": "./lucidshark",
                  "args": ["serve"]
                }
              }
            }
            ```

            ## Default Scanner Plugin Versions

            | Scanner Plugin | Version |
            |----------------|---------|
            | Trivy | ${{ steps.versions.outputs.trivy }} |
            | OpenGrep | ${{ steps.versions.outputs.opengrep }} |
            | gosec | ${{ steps.versions.outputs.gosec }} |
            | Checkov | ${{ steps.versions.outputs.checkov }} |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
