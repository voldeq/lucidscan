name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions: read-all

env:
  PYTHON_VERSION: "3.11"

jobs:
  lucidshark:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # Install lucidshark in editable mode to register entry points
          pip install -e .

      - name: Build binary with PyInstaller
        run: |
          pyinstaller lucidshark.spec --clean

      - name: Run LucidShark (full scan)
        run: |
          ./dist/lucidshark --verbose scan --all --all-files --format summary

      - name: Generate coverage XML for Codecov
        if: matrix.os == 'ubuntu-latest'
        run: |
          coverage xml

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload scan results for overview
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: scan-results
          path: .lucidshark/last-scan.json
          retention-days: 1

  # Update QUALITY.md on main branch (reuses scan results from lucidshark job)
  update-quality:
    needs: lucidshark
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install LucidShark dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # Install lucidshark in editable mode to register entry points
          pip install -e .

      - name: Build binary with PyInstaller
        run: |
          pyinstaller lucidshark.spec --clean

      - name: Download scan results
        uses: actions/download-artifact@v8
        with:
          name: scan-results
          path: .lucidshark

      - name: Update quality overview
        run: |
          ./dist/lucidshark overview --update

      - name: Commit and push QUALITY.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add QUALITY.md .lucidshark/quality-history.json
          git diff --staged --quiet || git commit -m "chore: update quality overview"
          git push
